# ── Company job-board definitions ───────────────────────────────────────────────
#
# Fields:
#   name         Display name
#   type         greenhouse | lever | workday | generic | playwright | email_only
#   disabled     true  →  skip this company
#
# type=greenhouse:  board_token   (boards-api.greenhouse.io/v1/boards/{token}/jobs)
# type=lever:       company_id    (api.lever.co/v0/postings/{company_id})
# type=workday:     workday_base + workday_path
# type=generic:     careers_url  + optional link_pattern (substring filter on href)
# type=playwright:  careers_url  + optional link_pattern + optional playwright_wait_for (CSS selector)
# type=eightfold:   careers_url  + eightfold_domain  (eightfold.ai-powered sites)
# type=email_only:  resume_email  (no scraping; manual application only)
#
# All Greenhouse tokens live-verified. Generic URLs HTTP-verified.
# Firms marked "private" have no known public job board; set disabled:true to skip.
# ─────────────────────────────────────────────────────────────────────────────────

