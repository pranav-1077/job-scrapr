# ── Email settings ──────────────────────────────────────────────────────────────
email:
  # sender and recipients are injected via environment variables in CI:
  #   EMAIL_SENDER, EMAIL_RECIPIENTS (comma-separated)
  # For local runs, set them here or in .env
  smtp_host: smtp.gmail.com
  smtp_port: 587
  # Set SMTP_PASSWORD in .env (Gmail App Password — NOT your account password)
  # Generate one at: https://myaccount.google.com/apppasswords

# ── Filtering ────────────────────────────────────────────────────────────────────
# Only report jobs whose title contains at least one of these keywords (case-insensitive).
# Leave empty to receive ALL new postings.
keyword_filters:
  - quant
  - quantitative
  - software
  - engineer
  - developer
  - software engineer
  - software developer
  - research
  - researcher
  - trader
  - data scientist
  - data engineer
  - data
  - machine learning
  - machine learning engineer
  - algorithmic

# ── Storage ───────────────────────────────────────────────────────────────────────
data_dir: ./data

# ── Request behaviour ─────────────────────────────────────────────────────────────
request_timeout: 30   # seconds per HTTP request

# ── Parallelism ───────────────────────────────────────────────────────────────────
max_workers: 10                # concurrent scrapers; keep low enough to avoid rate-limiting
scraper_timeout: 60            # seconds per scraper (API/generic) before considered hung
playwright_scraper_timeout: 120  # seconds per scraper (Playwright) — needs browser launch time
max_job_age_days: 60  # ignore jobs posted more than this many days ago (API scrapers only)
