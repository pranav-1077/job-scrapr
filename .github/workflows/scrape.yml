name: Daily Job Scrape

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 8:00 AM PT (UTC-7 summer / UTC-8 winter); weekdays only
  workflow_dispatch:         # allow manual trigger from GitHub UI
    inputs:
      catalog_only:
        description: 'Catalog jobs without sending email (use for first run)'
        type: boolean
        default: false
      dry_run:
        description: 'Scrape but do not send email'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.catalog_only }}" = "true" ]; then
            FLAGS="$FLAGS --catalog-only"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python main.py $FLAGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs.json [skip ci]"
          git push
